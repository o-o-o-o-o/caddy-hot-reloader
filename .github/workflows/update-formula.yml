name: Update Homebrew Formula

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update formula to (e.g., v1.0.0)"
        required: true

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release info
        id: release
        run: |
          VERSION="${{ github.event.release.tag_name || github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "url=https://github.com/${{ github.repository }}/archive/refs/tags/${VERSION}.tar.gz" >> $GITHUB_OUTPUT

      - name: Calculate SHA256
        id: sha
        run: |
          curl -sL "${{ steps.release.outputs.url }}" -o release.tar.gz
          echo "sha256=$(sha256sum release.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update Formula
        run: |
          sed -i "s|url \".*\"|url \"${{ steps.release.outputs.url }}\"|" Formula/caddy-hot-reloader.rb
          sed -i "s|sha256 \".*\"|sha256 \"${{ steps.sha.outputs.sha256 }}\"|" Formula/caddy-hot-reloader.rb

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          commit-message: "chore: update formula to ${{ steps.release.outputs.version }}"
          title: "Update formula to ${{ steps.release.outputs.version }}"
          body: |
            Automated update of Homebrew formula for release ${{ steps.release.outputs.version }}.

            - URL: ${{ steps.release.outputs.url }}
            - SHA256: ${{ steps.sha.outputs.sha256 }}
          branch: update-formula-${{ steps.release.outputs.version }}
          delete-branch: true
