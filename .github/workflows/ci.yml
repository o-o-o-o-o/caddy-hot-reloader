name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

  formula-checks:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Homebrew
        run: brew update --quiet

      - name: Brew style
        run: brew style Formula/caddy-hot-reloader.rb

      - name: Build and install formula
        run: brew install --build-from-source ./Formula/caddy-hot-reloader.rb

      - name: Brew audit
        run: brew audit --strict --online caddy-hot-reloader

      - name: Formula runtime test
        run: brew test caddy-hot-reloader
