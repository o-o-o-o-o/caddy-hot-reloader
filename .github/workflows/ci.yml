name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

  formula-checks:
    runs-on: macos-latest
    env:
      TAP_NAME: local/test
      FORMULA_NAME: caddy-hot-reloader
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Homebrew
        run: brew update --quiet

      - name: Brew style
        run: brew style Formula/caddy-hot-reloader.rb

      - name: Create temporary tap and copy formula
        run: |
          brew tap-new "$TAP_NAME"
          TAP_DIR="$(brew --repository)/Library/Taps/local/homebrew-test"
          cp Formula/caddy-hot-reloader.rb "$TAP_DIR/Formula/"

      - name: Build and install formula
        run: brew install --build-from-source "$TAP_NAME/$FORMULA_NAME"

      - name: Brew audit
        run: brew audit --strict --online "$TAP_NAME/$FORMULA_NAME"

      - name: Formula runtime test
        run: brew test "$TAP_NAME/$FORMULA_NAME"
